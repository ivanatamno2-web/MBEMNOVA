<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premier page </title>
    <style>
        body{
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: url("site_vitrine/image/jjk.JPG") center/cover fixed no-repeat;
        }
h1 {
  animation: fadeIn 1.5s ease-in-out;
}

span a {
  animation: slideUp 1s ease forwards;
  opacity: 0;
}

span a:nth-child(1) {
  animation-delay: 0.5s;
}

span a:nth-child(2) {
  animation-delay: 1s;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-20px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

a {
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}

/* Effet hover moderne */
a:hover {
  transform: translateY(-5px) scale(1.05);
  background-color: #90ee90 !important;
  color: #000 !important;
  box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

/* Effet clic */
a:active {
  transform: scale(0.95);
}

/* Effet lumière animé */
a::before {
  content: "";
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(120deg, transparent, rgba(255,255,255,0.5), transparent);
  transition: 0.5s;
}

a:hover::before {
  left: 100%;
}
@media (max-width: 400px){
a{
    font-size: 15px;
    padding:6px 0px ;
    margin:0 5px ;
}
}
@media (max-width: 300px){
a{
    font-size: 15px;
    padding:6px 0px ;
    margin:0 5px ;
}
}
</style>
</head>
<body  style="height: 100%; overflow: hidden; display: inline;  place-items: center;">
    <h1 style="height:40vh; color:red; display: flex; justify-content: center; align-items: end; " >Hello word !!! </h1>
    <span style="height:60vh; display: flex; justify-content: center; align-items:baseline;">
        <a href="site_vitrine\voyage.html" style="text-decoration: none;border-radius: 12vh; padding:8px 30px ;margin:0 15px 0 15px ;  font-size: 110%; color: rgb(240, 255, 255); background-color: rgba(13, 14, 14, 0.4); ">Site vitrine</a>
        <a href="Presentation\Presentation.html" style="text-decoration: none;border-radius: 12vh; padding:8px 30px ; margin:0 15px 0 15px ; font-size: 110%; color: rgb(240, 255, 255); background-color: rgba(13, 14, 14, 0.4);">Presentation</a>
    </span>
    
</body>
</html>
